<body>

<div class="search-bar">
    <input type="text" id="itemSearch" placeholder="Search Items...">
</div>

<div id="itemContainer"></div>
<div id="cardPopup" class="card-popup"></div>

<script src="script.js"></script>
<script>
(async function(){
    const CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMWKaNuiGKg_JmWT6G-eIm_2b9djoLisLoLkoRXvVDjo9xvUBK3HJrhnilNSA4kNMO9PxVYqlZz69U/pub?gid=1492959337&single=true&output=csv";
    const items = await loadCSV(CSV);
    const columns=["Name","Cost","Weight","Attributes"];
    attachSearch("itemSearch", null, items, "itemContainer", columns, null);
    buildList("itemContainer", items, columns, null);
})();
</script>
