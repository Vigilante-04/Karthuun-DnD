<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Karthuun DnD - Locations</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <button class="backButton" onclick="window.location='index.html'">← Back</button>
    <h1>Locations</h1>
</header>

<div class="search-bar">
    <input type="text" id="locSearch" placeholder="Search Locations...">
</div>

<div id="locationContainer"></div>
<div id="cardPopup" class="card-popup"></div>

<script src="script.js"></script>
<script>
(async function(){
    const LOC_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSMWKaNuiGKg_JmWT6G-eIm_2b9djoLisLoLkoRXvVDjo9xvUBK3HJrhnilNSA4kNMO9PxVYqlZz69U/pub?gid=30016903&single=true&output=csv";
    const locs = await loadCSV(LOC_CSV);
    const columns = ["Location Name","Description"];
    attachSearch("locSearch", null, locs, "locationContainer", columns, "Location Image");
    buildList("locationContainer", locs, columns, "Location Image");
})();
</script>
</body>
</html>
