<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Karthuun DnD Campaign</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>

<!-- Landing Page -->
<section id="landing" class="active">
    <h1>Welcome to Karthuun DnD Campaign</h1>
    <input id="landingSearch" type="text" placeholder="Search NPC by name...">
    <div class="landingButtons">
        <div class="landingBtn" data-target="npcPage">
            <img class="btnImage" src="" alt="NPCs">
            <span>NPCs</span>
        </div>
        <div class="landingBtn" data-target="locationPage">
            <img class="btnImage" src="" alt="Locations">
            <span>Locations</span>
        </div>
        <div class="landingBtn" data-target="mapPage">
            <img class="btnImage" src="" alt="Map">
            <span>Map (Coming Soon)</span>
        </div>
    </div>
</section>

<!-- NPC Page -->
<section id="npcPage">
    <button class="backBtn" data-target="landing">&larr; Back</button>
    <h1>NPC Tracker</h1>
    <div class="filters">
        <input id="npcSearch" placeholder="Search NPC by name, race, or type...">
        <select id="raceFilter"><option value="">All Races</option></select>
        <select id="sexFilter"><option value="">All Sexes</option></select>
        <select id="locationFilter"><option value="">All Locations</option></select>
    </div>
    <table id="npcTable">
        <thead>
            <tr>
                <th data-sort="Name">Name</th>
                <th data-sort="Surname">Surname</th>
                <th data-sort="Age">Age</th>
                <th data-sort="Race">Race</th>
                <th data-sort="Gender">Gender</th>
                <th data-sort="Last Known Location">Last Known Location</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</section>

<!-- Location Page -->
<section id="locationPage">
    <button class="backBtn" data-target="landing">&larr; Back</button>
    <h1>Locations</h1>
    <input id="locationSearch" placeholder="Search Locations...">
    <ul id="locationList"></ul>
    <!-- Location Overlay -->
    <div id="locationOverlay">
        <div class="overlayContent">
            <span id="closeLocationOverlay">&times;</span>
            <img id="locationImage" src="">
            <div id="locationDesc"></div>
            <div class="mapPlaceholder">MAP coming soon...</div>
        </div>
    </div>
</section>

<!-- Map Page -->
<section id="mapPage">
    <button class="backBtn" data-target="landing">&larr; Back</button>
    <h1>Map</h1>
    <p>Map functionality coming soon...</p>
</section>

<script src="script.js"></script>
</body>
</html>
