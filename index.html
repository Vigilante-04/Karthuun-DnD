<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Karthuun DnD - Landing</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section>
    <h1>Welcome to Karthuun DnD Campaign</h1>
    <div class="landing-buttons">
        <a href="npcs.html" class="button-card" id="npcBtn">NPCs</a>
        <a href="locations.html" class="button-card" id="locBtn">Locations</a>
        <a href="monsters.html" class="button-card" id="monsterBtn">Monsters</a>
        <a href="items.html" class="button-card" id="itemBtn">Items</a>
        <a href="spells.html" class="button-card" id="spellBtn">Spells</a>
        <a href="hexmap.html" class="button-card" id="hexBtn">Hex Map</a>
    </div>
    <div class="search-bar">
        <input type="text" id="landingSearch" placeholder="Search all...">
    </div>
</section>
<script src="script.js"></script>
<script>
// You can assign random images for landing buttons here if desired
const btns = ["npcBtn","locBtn","monsterBtn","itemBtn","spellBtn","hexBtn"];
btns.forEach(id=>{
    const el = document.getElementById(id);
    const randomImg = "https://picsum.photos/200/200?random=" + Math.floor(Math.random()*100);
    el.style.backgroundImage = `url(${randomImg})`;
});
</script>
</body>
</html>
