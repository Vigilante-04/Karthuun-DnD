<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Karthuun DnD</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LANDING PAGE -->
<section id="landingPage">
    <h1>Welcome to Karthuun DnD Campaign</h1>
    <div class="landingButtons">
        <button id="landingNPCBtn" class="landingBtn"></button>
        <button id="landingLocationBtn" class="landingBtn"></button>
        <button class="landingBtn" disabled>Map (Coming Soon)</button>
    </div>
    <input type="text" id="landingSearch" placeholder="Search NPCs or Locations...">
</section>

<!-- NPC PAGE -->
<section id="npcPage" style="display:none">
    <button class="backBtn" id="backToLandingNPC">← Back</button>
    <div class="filters">
        <input type="text" id="npcSearch" placeholder="Search NPCs...">
        <select id="raceFilter"></select>
        <select id="genderFilter"></select>
        <select id="locationFilter"></select>
    </div>
    <div id="npcList"></div>
</section>

<!-- NPC Overlay -->
<div id="npcOverlay" class="overlay" style="display:none"></div>

<!-- LOCATION PAGE -->
<section id="locationPage" style="display:none">
    <button class="backBtn" id="backToLandingLocation">← Back</button>
    <input type="text" id="locationSearch" placeholder="Search Locations...">
    <div id="locationList"></div>
</section>

<!-- Location Overlay -->
<div id="locationOverlay" class="overlay" style="display:none"></div>

<script src="script.js"></script>
</body>
</html>
